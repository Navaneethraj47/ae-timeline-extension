<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AE Timeline Adjuster</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="panel">

    <!-- Header -->
    <div class="header">
      <div class="logo">⏱</div>
      <div>
        <h1>Timeline Adjuster</h1>
        <p class="subtitle" id="comp-name">No composition loaded</p>
      </div>
    </div>

    <!-- Comp Info -->
    <div class="card" id="comp-info-card">
      <div class="card-title">COMPOSITION INFO</div>
      <div class="info-grid">
        <div class="info-item"><span class="label">Duration</span><span id="info-duration">—</span></div>
        <div class="info-item"><span class="label">FPS</span><span id="info-fps">—</span></div>
        <div class="info-item"><span class="label">Work In</span><span id="info-workin">—</span></div>
        <div class="info-item"><span class="label">Work Out</span><span id="info-workout">—</span></div>
        <div class="info-item"><span class="label">Layers</span><span id="info-layers">—</span></div>
      </div>
      <button class="btn btn-secondary" id="btn-refresh">↻ Refresh</button>
    </div>

    <!-- Work Area -->
    <div class="card">
      <div class="card-title">SET WORK AREA</div>
      <div class="input-row">
        <label>In Point (s)</label>
        <input type="number" id="work-in" value="0" step="0.1" min="0" />
      </div>
      <div class="input-row">
        <label>Out Point (s)</label>
        <input type="number" id="work-out" value="5" step="0.1" min="0" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-set-work">Set Work Area</button>
        <button class="btn btn-danger" id="btn-trim">Trim to Work Area</button>
      </div>
    </div>

    <!-- Jump to Time -->
    <div class="card">
      <div class="card-title">JUMP TO TIME</div>
      <div class="input-row">
        <label>Time (s)</label>
        <input type="number" id="jump-time" value="0" step="0.1" min="0" />
      </div>
      <button class="btn btn-primary" id="btn-jump">Go to Time</button>
    </div>

    <!-- Shift Layers -->
    <div class="card">
      <div class="card-title">SHIFT SELECTED LAYERS</div>
      <div class="input-row">
        <label>Offset (s)</label>
        <input type="number" id="shift-amount" value="0.5" step="0.1" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-shift-forward">▶ Forward</button>
        <button class="btn btn-secondary" id="btn-shift-back">◀ Back</button>
      </div>
    </div>

    <!-- Layer List -->
    <div class="card">
      <div class="card-title">LAYER TIMELINE</div>
      <div id="layer-list" class="layer-list">
        <div class="empty-state">Click Refresh to load layers</div>
      </div>
    </div>

    <!-- Status -->
    <div id="status-bar" class="status-bar">Ready</div>
  </div>

  <script type="text/javascript" src="js/CSInterface.js"></script>
  <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
